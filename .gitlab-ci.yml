# haj の CI。
#
#   push/MR  → test (fmt / clippy / cargo test)
#   master   → test → build → mirror (GitHub)
#   tag      → test → build (社内控え) + build-public (公開) → publish (Package Registry)
#              → mirror (GitHub) → release (GitLab) + github-release (GitHub Releases)
#
# GitHub 連携(mirror / github-release)は CI 変数 GH_APP_ID / GH_APP_PRIVATE_KEY が
# あるときだけ走る(ci/github.sh 参照。App: haj-release、鍵の正は bao)。
#
# イメージは avap.plus のプロキシキャッシュ経由で取る(このインスタンスの作法)。
# rust:1-alpine は musl がネイティブなので、クロスコンパイルの仕掛けが要らずに
# 依存ゼロの静的バイナリが出る。

stages:
  - test
  - build
  - publish
  - release

variables:
  # CIの中でだけ使う。開発者の ~/.cargo は汚さない。
  CARGO_HOME: $CI_PROJECT_DIR/.cargo
  CARGO_TERM_COLOR: always
  TARGET: x86_64-unknown-linux-musl

default:
  image: avap.plus/dockerhub/library/rust:1-alpine
  before_script:
    # rust:1-alpine には C リンカが無い。musl-dev を入れないと `cc` が見つからず落ちる。
    - apk add --no-cache musl-dev >/dev/null
  cache:
    key:
      files:
        - Cargo.lock
    paths:
      - .cargo/
      - target/

test:
  stage: test
  script:
    - rustup component add rustfmt clippy
    - cargo fmt --check
    # 警告をエラーとして扱う。放置された警告は誰も読まなくなる。
    - cargo clippy --all-targets -- -D warnings
    - cargo test --locked
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# タグと Cargo.toml の版が食い違ったまま公開されると、
# 「0.2.0 と名乗る 0.1.0 のバイナリ」が配られて追跡不能になる。ここで止める。
#
# 併せて、以降のジョブが使う VERSION(タグから先頭のvを落としたもの)を配る。
# GitLab CIのYAMLでは release: セクションで ${VAR#v} のような加工ができないため、
# ここで確定させて dotenv で渡すしかない。
version:
  stage: test
  before_script: []
  script:
    - |
      CARGO_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
      VERSION="${CI_COMMIT_TAG#v}"
      echo "Cargo.toml: ${CARGO_VERSION} / tag: ${CI_COMMIT_TAG} → ${VERSION}"
      if [ "$CARGO_VERSION" != "$VERSION" ]; then
        echo "error: タグ (${VERSION}) と Cargo.toml の version (${CARGO_VERSION}) が一致しません。" >&2
        echo "  Cargo.toml を直してタグを打ち直してください。" >&2
        exit 1
      fi
      echo "VERSION=${VERSION}" > version.env
  artifacts:
    reports:
      dotenv: version.env
  cache: []
  rules:
    - if: $CI_COMMIT_TAG

build:
  stage: build
  before_script:
    - apk add --no-cache musl-dev binutils >/dev/null
  script:
    - rustup target add "$TARGET"
    - cargo build --release --locked --target "$TARGET"
    - mkdir -p dist
    - cp "target/${TARGET}/release/haj" dist/haj
    # 依存ゼロの静的バイナリであることを、思い込みではなく毎回確かめる。
    # ここが動的リンクになると alpine や distroless で動かなくなる。
    #
    # 判定に ldd を使ってはいけない。musl の ldd は動的ローダ自身なので、
    # 完全に静的な static-pie バイナリに対しても "/lib/ld-musl-x86_64.so.1" と
    # 自分を出力する。ELFヘッダを直接見る。
    #   INTERP セグメント → 動的リンカを要求している
    #   NEEDED エントリ   → 共有ライブラリに依存している
    - |
      if readelf -l dist/haj | grep -q INTERP; then
        echo "error: INTERPセグメントがあります(動的リンクです)" >&2
        readelf -l dist/haj | grep -A1 INTERP >&2
        exit 1
      fi
      if readelf -d dist/haj 2>/dev/null | grep -q NEEDED; then
        echo "error: 共有ライブラリに依存しています" >&2
        readelf -d dist/haj | grep NEEDED >&2
        exit 1
      fi
      echo "静的リンク OK ($(du -h dist/haj | cut -f1)): $(file dist/haj 2>/dev/null || echo static-pie)"
    # 出来たバイナリが実際に動くところまで見る
    - ./dist/haj --version
    - |
      tar -czf "dist/haj-${TARGET}.tar.gz" -C dist haj
      cd dist && sha256sum "haj-${TARGET}.tar.gz" > "haj-${TARGET}.tar.gz.sha256"
      cat "haj-${TARGET}.tar.gz.sha256"
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# 汎用パッケージレジストリへ上げる(社内向けの控え。公開配布は GitHub Releases)。
publish:
  stage: publish
  before_script:
    - apk add --no-cache curl >/dev/null
  needs:
    - job: build
      artifacts: true
    - job: version
      artifacts: true
    - job: test
  cache: []
  script:
    - |
      BASE="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/haj/${VERSION}"
      for f in "haj-${TARGET}.tar.gz" "haj-${TARGET}.tar.gz.sha256"; do
        echo "==> PUT ${BASE}/${f}"
        curl --fail --silent --show-error \
          --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "dist/${f}" \
          "${BASE}/${f}"
        echo
      done
  rules:
    - if: $CI_COMMIT_TAG

release:
  stage: release
  # release-cli は dockerhub ではなく gitlab.com のレジストリにある
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  before_script: []
  cache: []
  needs:
    - job: publish
    - job: version
      artifacts: true
  script:
    - echo "リリース ${CI_COMMIT_TAG} (${VERSION}) を作成します"
  release:
    tag_name: $CI_COMMIT_TAG
    name: haj $CI_COMMIT_TAG
    description: |
      Linux x86_64 の静的バイナリ (musl)。glibc も bash も要らない。

      公開配布は GitHub Releases:
      https://github.com/AvapCoLtd/haj/releases/tag/${CI_COMMIT_TAG}

      ```sh
      curl -fsSL https://raw.githubusercontent.com/AvapCoLtd/haj/master/install.sh | sh
      ```
    assets:
      links:
        - name: haj-x86_64-unknown-linux-musl.tar.gz
          url: $CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/haj/${VERSION}/haj-x86_64-unknown-linux-musl.tar.gz
          link_type: package
        - name: haj-x86_64-unknown-linux-musl.tar.gz.sha256
          url: $CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/haj/${VERSION}/haj-x86_64-unknown-linux-musl.tar.gz.sha256
          link_type: other
  rules:
    - if: $CI_COMMIT_TAG

# ---- 公開配布 (Issue #10) ----------------------------------------------------

# GitHub AvapCoLtd/haj へのミラー。GitLab が正で、ミラーは常に GitLab の姿へ合わせる。
# App token は1時間で失効するため GitLab 組み込みミラーは使えない(ジョブ駆動)。
mirror:
  stage: publish
  image: avap.plus/dockerhub/library/alpine:3
  before_script:
    - apk add --no-cache git curl openssl >/dev/null
  cache: []
  needs:
    - job: test
  script:
    - sh ci/github.sh mirror
  rules:
    - if: '$GH_APP_ID == null'
      when: never
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# GitHub Releases 用アセット(x86_64 / aarch64)。バイナリは1種類だけ
# (社内固有の既定値は焼き込まない。avap の値は各自の設定ファイルに書く)。
.build-public: &build-public
  stage: build
  cache: []
  script:
    - rustup target add "$PUB_TARGET" 2>/dev/null || true
    - cargo build --release --locked --target "$PUB_TARGET"
    - mkdir -p dist-public
    - cp "target/${PUB_TARGET}/release/haj" dist-public/haj
    - tar -czf "dist-public/haj-${PUB_TARGET}.tar.gz" -C dist-public haj
    - rm dist-public/haj
    - cd dist-public && sha256sum "haj-${PUB_TARGET}.tar.gz" > "haj-${PUB_TARGET}.tar.gz.sha256"
  artifacts:
    paths:
      - dist-public/
    expire_in: 1 week
  rules:
    - if: '$GH_APP_ID == null'
      when: never
    - if: $CI_COMMIT_TAG

build-public-x86_64:
  <<: *build-public
  variables:
    PUB_TARGET: x86_64-unknown-linux-musl

build-public-aarch64:
  <<: *build-public
  # aarch64-musl のクロスツールチェーン入りイメージ。
  image: avap.plus/dockerhub/messense/rust-musl-cross:aarch64-musl
  before_script: []
  variables:
    PUB_TARGET: aarch64-unknown-linux-musl
    # このイメージはクロスリンカの設定を /root/.cargo/config.toml に持っているが、
    # CI 全体で CARGO_HOME をプロジェクト内に向けているため読まれない。
    # 結果、ホストの ld で aarch64 をリンクしようとして
    # 「file in wrong format」で落ちる。リンカを環境変数で明示する。
    CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-unknown-linux-musl-gcc
    CC_aarch64_unknown_linux_musl: aarch64-unknown-linux-musl-gcc

# GitHub Releases。タグはミラー済みであること(needs: mirror)。
github-release:
  stage: release
  image: avap.plus/dockerhub/library/alpine:3
  before_script:
    - apk add --no-cache curl openssl >/dev/null
  cache: []
  needs:
    - job: mirror
    - job: build-public-x86_64
      artifacts: true
    - job: build-public-aarch64
      artifacts: true
    - job: version
      artifacts: true
  script:
    - sh ci/github.sh release "$CI_COMMIT_TAG"
  rules:
    - if: '$GH_APP_ID == null'
      when: never
    - if: $CI_COMMIT_TAG
